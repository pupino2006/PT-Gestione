<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT - Arrivi Merce</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004a99">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="ptsimbolo.png">
    
    <!-- Tesseract.js per OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <!-- SheetJS per Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #004a99; 
            --secondary: #8b98a7; 
            --bg: #f0f2f5; 
            --white: #ffffff; 
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #333; 
            padding-bottom: 80px;
        }
        
        .header-logo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            background: var(--white); 
            border-bottom: 1px solid #ddd; 
        }
        .header-logo img { height: 50px; }
        
        .tabs { 
            display: flex; 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px 5px; 
            border: none; 
            background: none; 
            color: rgba(255,255,255,0.7); 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border-bottom: 3px solid transparent; 
            font-size: 0.85rem;
        }
        .tab-btn.active { 
            color: white; 
            border-bottom-color: white; 
            background: rgba(255,255,255,0.1); 
        }
        
        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        .card { 
            background: var(--white); 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        
        .section-title { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 20px 0 15px; 
            text-align: center; 
            font-weight: bold; 
        }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary); font-size: 0.85rem; }
        .input-group input, .input-group select, .input-group textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 1rem; 
        }
        
        .btn-main { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }
        
        .btn-secondary { 
            background: var(--secondary); 
        }
        
        .btn-success { 
            background: var(--success); 
        }
        
        .btn-danger { 
            background: var(--danger); 
        }
        
        /* Foto Preview */
        .foto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        
        .foto-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        
        .foto-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
        
        .foto-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .foto-info {
            padding: 5px;
            font-size: 0.75rem;
            background: #f8f9fa;
            text-align: center;
        }
        
        /* Colli */
        .collo-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .collo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .collo-number {
            font-weight: bold;
            color: var(--primary);
        }
        
        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        /* Loading */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Riepilogo */
        .riepilogo-box {
            background: #d4edda;
            border-left: 4px solid var(--success);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .totali {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .totale-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
        
        .totale-num {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        
        .totale-label {
            font-size: 0.75rem;
            color: var(--secondary);
        }
        
        /* Tabella dati */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.85rem;
        }
        
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        .data-table th {
            background: var(--primary);
            color: white;
        }
        
        .data-table tr:nth-child(even) {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Elaborazione in corso...</div>
    </div>

    <div class="header-logo">
        <img src="ptsimbolo.png" alt="Logo PT">
    </div>

    <!-- TABS -->
    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab('foto')">📸 FOTO</button>
        <button class="tab-btn" onclick="openTab('dati')">📝 DATI</button>
        <button class="tab-btn" onclick="openTab('colli')">📦 COLLI</button>
        <button class="tab-btn" onclick="openTab('salva')">💾 SALVA</button>
    </nav>

    <!-- TAB 1: FOTO -->
    <div id="tab-foto" class="tab-content container">
        <div class="section-title">📸 Carica Foto Etichette</div>
        
        <div class="card">
            <p style="color: var(--secondary); font-size: 0.9rem; margin-bottom: 15px;">
                Carica una o più foto delle etichette dei colli. L'app proverà ad estrarre automaticamente i dati (codice, MQ, peso).
            </p>
            
            <input type="file" id="fotoInput" accept="image/*" multiple style="display: none;" onchange="gestisciFotoSelezionate(event)">
            
            <button class="btn-main" onclick="document.getElementById('fotoInput').click()">
                📁 Seleziona Foto dalla Galleria
            </button>
            
            <div id="fotoGrid" class="foto-grid"></div>
            
            <button id="btnOCR" class="btn-main btn-secondary" onclick="avviaOCR()" style="display: none;">
                🔍 Analizza Foto con OCR
            </button>
        </div>
    </div>

    <!-- TAB 2: DATI COMUNI -->
    <div id="tab-dati" class="tab-content container" style="display: none;">
        <div class="section-title">📝 Dati Comuni a Tutti i Colli</div>
        
        <div class="card">
            <div class="input-group">
                <label>🏭 Fornitore:</label>
                <select id="fornitore">
                    <option value="">Seleziona...</option>
                    <option value="LAMPRE">LAMPRE</option>
                    <option value="MARCEGAGLIA">MARCEGAGLIA</option>
                    <option value="ARCELORMITTAL">ARCELORMITTAL</option>
                    <option value="NOVELIS">NOVELIS</option>
                    <option value="ALTRO">ALTRO</option>
                    <option value="Sconosciuto">Sconosciuto</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>📅 Data Arrivo:</label>
                <input type="date" id="dataArrivo">
            </div>
            
            <div class="input-group">
                <label>📝 Note / Descrizione:</label>
                <textarea id="note" rows="3" placeholder="Note aggiuntive..."></textarea>
            </div>
        </div>
    </div>

    <!-- TAB 3: COLLI -->
    <div id="tab-colli" class="tab-content container" style="display: none;">
        <div class="section-title">📦 Dati per ogni Collo</div>
        
        <div class="card">
            <div class="input-group">
                <label>Numero di Colli:</label>
                <input type="number" id="numColli" min="1" max="100" value="1" onchange="aggiornaColli()">
            </div>
            
            <button class="btn-main btn-secondary" onclick="aggiungiCollo()">
                ➕ Aggiungi Collo
            </button>
        </div>
        
        <div id="colliContainer"></div>
    </div>

    <!-- TAB 4: SALVA -->
    <div id="tab-salva" class="tab-content container" style="display: none;">
        <div class="section-title">💾 Salva ed Esporta</div>
        
        <div class="riepilogo-box">
            <h4 style="margin-top: 0;">📊 Riepilogo</h4>
            <div class="totali">
                <div class="totale-item">
                    <div class="totale-num" id="totColli">0</div>
                    <div class="totale-label">Colli</div>
                </div>
                <div class="totale-item">
                    <div class="totale-num" id="totMQ">0</div>
                    <div class="totale-label">MQ Totali</div>
                </div>
                <div class="totale-item">
                    <div class="totale-num" id="totPeso">0</div>
                    <div class="totale-label">KG Totali</div>
                </div>
            </div>
        </div>
        
        <div id="tabellaPreview"></div>
        
        <button class="btn-main btn-success" onclick="esportaExcel()">
            📥 Esporta in Excel
        </button>
        
        <button class="btn-main" onclick="nuovoCarico()" style="background: var(--secondary);">
            🔄 Nuovo Carico
        </button>
        
        <button class="btn-main btn-danger" onclick="salvaInCloud()" style="background: #6f42c1;">
            ☁️ Salva nel Cloud (Supabase)
        </button>
    </div>

    <script>
        // ============================================
        // STATO APPLICAZIONE
        // ============================================
        const stato = {
            foto: [],           // Foto caricate {file, dataUrl, nome}
            datiOCR: [],        // Dati estratti dall'OCR per ogni foto
            numColli: 1,
            colli: []           // Dati per ogni collo
        };
        
        // Inizializza
        document.getElementById('dataArrivo').valueAsDate = new Date();
        aggiornaColli();
        
        // ============================================
        // GESTIONE TAB
        // ============================================
        function openTab(tabName) {
            // Nascondi tutti i tab
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Mostra tab selezionato
            document.getElementById('tab-' + tabName).style.display = 'block';
            event.target.classList.add('active');
            
            // Aggiorna riepilogo se siamo nel tab salva
            if (tabName === 'salva') aggiornaRiepilogo();
        }
        
        // ============================================
        // GESTIONE FOTO
        // ============================================
        function gestisciFotoSelezionate(event) {
            const files = event.target.files;
            
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Evita duplicati
                    if (!stato.foto.some(f => f.nome === file.name)) {
                        stato.foto.push({
                            file: file,
                            dataUrl: e.target.result,
                            nome: file.name
                        });
                        stato.datiOCR.push({
                            codice: '', mq: 0, peso: 0, barcode: '',
                            spessore: 0, larghezza: 0, lunghezza: 0,
                            colore: '', nome_foto: file.name
                        });
                        aggiornaFotoGrid();
                    }
                };
                reader.readAsDataURL(file);
            }
            
            // Resetta input
            event.target.value = '';
        }
        
        function aggiornaFotoGrid() {
            const grid = document.getElementById('fotoGrid');
            const btnOCR = document.getElementById('btnOCR');
            
            if (stato.foto.length === 0) {
                grid.innerHTML = '';
                btnOCR.style.display = 'none';
                return;
            }
            
            btnOCR.style.display = 'block';
            btnOCR.textContent = `🔍 Analizza ${stato.foto.length} Foto con OCR`;
            
            grid.innerHTML = stato.foto.map((foto, idx) => `
                <div class="foto-item">
                    <img src="${foto.dataUrl}" alt="${foto.nome}">
                    <button class="foto-remove" onclick="rimuoviFoto(${idx})">×</button>
                    <div class="foto-info">${foto.nome.substring(0, 15)}...</div>
                </div>
            `).join('');
        }
        
        function rimuoviFoto(idx) {
            stato.foto.splice(idx, 1);
            stato.datiOCR.splice(idx, 1);
            aggiornaFotoGrid();
        }
        
        // ============================================
        // OCR con Tesseract.js
        // ============================================
        async function avviaOCR() {
            if (stato.foto.length === 0) {
                alert('Carica prima delle foto!');
                return;
            }
            
            mostraLoading('Analisi OCR in corso...');
            
            try {
                const worker = await Tesseract.createWorker('ita+eng');
                
                for (let i = 0; i < stato.foto.length; i++) {
                    const { data } = await worker.recognize(stato.foto[i].dataUrl);
                    const dati = estraiDatiOCR(data.text);
                    stato.datiOCR[i] = { ...stato.datiOCR[i], ...dati };
                    
                    document.getElementById('loading-text').textContent = 
                        `Analizzando foto ${i + 1} di ${stato.foto.length}...`;
                }
                
                await worker.terminate();
                
                // Assicura che ci siano tanti colli quante foto
                if (stato.numColli < stato.foto.length) {
                    stato.numColli = stato.foto.length;
                    document.getElementById('numColli').value = stato.numColli;
                    aggiornaColli();
                }
                
                nascondiLoading();
                alert('✅ OCR completato! I dati sono stati estratti. Vai alla scheda COLLI per verificarli.');
                
            } catch (error) {
                nascondiLoading();
                console.error('Errore OCR:', error);
                alert('Errore durante l\'analisi OCR. Riprova.');
            }
        }
        
        // ============================================
        // ESTRAZIONE DATI DAL TESTO OCR
        // ============================================
        function estraiDatiOCR(testo) {
            const righe = testo.toUpperCase().split('\n').map(r => r.trim()).filter(r => r);
            const tCompleto = righe.join(' ');
            
            const dati = {
                codice: '',
                mq: 0,
                peso: 0,
                barcode: '',
                spessore: 0,
                larghezza: 0,
                lunghezza: 0,
                colore: ''
            };
            
            // Cerca barcode (pattern S + numeri)
            const bcMatch = tCompleto.match(/S[\s]*(\d[\s]*){9,10}/);
            if (bcMatch) dati.barcode = bcMatch[0].replace(/\s/g, '');
            
            // Cerca codice articolo
            const codMatch = tCompleto.match(/\b([A-Z]{2,4}\d{4,8}|\d{8})\b/);
            if (codMatch) dati.codice = codMatch[0];
            
            // Cerca MQ
            const mqMatch = tCompleto.match(/(\d+[.,]\d{1,3})\s*(?:MQ|M2|M²|METRI QUADRI)/i) ||
                           tCompleto.match(/(?:MQ|M2|M²)[^\d]*(\d+[.,]\d{1,3})/i);
            if (mqMatch) dati.mq = parseFloat(mqMatch[1].replace(',', '.'));
            
            // Cerca peso (KG)
            const pesoMatch = tCompleto.match(/(\d{4})\s*(?:KG|NET)/i) ||
                             tCompleto.match(/(?:KG|NET)[^\d]*(\d{4})/i);
            if (pesoMatch) {
                const peso = parseInt(pesoMatch[1]);
                if (peso > 500 && peso < 8000) dati.peso = peso;
            }
            
            // Cerca spessore
            const spessMatch = tCompleto.match(/0[.,](\d{2,3})\b|\b0(\d{2})\b/);
            if (spessMatch) {
                const res = (spessMatch[1] || spessMatch[2]).replace(',', '.');
                dati.spessore = parseFloat('0.' + res) || parseFloat(res) / 100;
            }
            
            // Cerca larghezza
            const largMatch = tCompleto.match(/\b(1000|1200|1219|1225|1250|1500)\b/);
            if (largMatch) dati.larghezza = parseInt(largMatch[1]);
            
            // Cerca colore
            const colMatch = tCompleto.match(/\b(MP\d{3}|RAL\s*\d{4}|\d{4})\b/i);
            if (colMatch) dati.colore = colMatch[0].replace(/\s/g, '');
            
            return dati;
        }
        
        // ============================================
        // GESTIONE COLLI
        // ============================================
        function aggiornaColli() {
            stato.numColli = parseInt(document.getElementById('numColli').value) || 1;
            
            // Assicura che ci siano abbastanza dati OCR
            while (stato.datiOCR.length < stato.numColli) {
                stato.datiOCR.push({
                    codice: '', mq: 0, peso: 0, barcode: '',
                    spessore: 0, larghezza: 0, lunghezza: 0,
                    colore: '', nome_foto: ''
                });
            }
            
            renderColli();
        }
        
        function aggiungiCollo() {
            stato.numColli++;
            document.getElementById('numColli').value = stato.numColli;
            stato.datiOCR.push({
                codice: '', mq: 0, peso: 0, barcode: '',
                spessore: 0, larghezza: 0, lunghezza: 0,
                colore: '', nome_foto: ''
            });
            renderColli();
        }
        
        function renderColli() {
            const container = document.getElementById('colliContainer');
            
            container.innerHTML = stato.colli.map((collo, idx) => `
                <div class="collo-card">
                    <div class="collo-header">
                        <span class="collo-number">📦 Collo ${idx + 1}</span>
                        <button class="btn-secondary" onclick="rimuoviCollo(${idx})" 
                                style="padding: 5px 10px; border-radius: 5px; border: none; background: #dc3545; color: white; cursor: pointer;">
                            🗑️
                        </button>
                    </div>
                    
                    <div class="two-cols">
                        <div class="input-group">
                            <label>🏷️ Codice:</label>
                            <input type="text" id="collo_codice_${idx}" value="${collo.codice || ''}" 
                                   onchange="aggiornaCollo(${idx}, 'codice', this.value)">
                        </div>
                        <div class="input-group">
                            <label>📐 MQ:</label>
                            <input type="number" step="0.01" id="collo_mq_${idx}" value="${collo.mq || 0}" 
                                   onchange="aggiornaCollo(${idx}, 'mq', parseFloat(this.value))">
                        </div>
                    </div>
                    
                    <div class="two-cols">
                        <div class="input-group">
                            <label>⚖️ Peso (KG):</label>
                            <input type="number" id="collo_peso_${idx}" value="${collo.peso || 0}" 
                                   onchange="aggiornaCollo(${idx}, 'peso', parseInt(this.value))">
                        </div>
                        <div class="input-group">
                            <label>📊 Barcode:</label>
                            <input type="text" id="collo_barcode_${idx}" value="${collo.barcode || ''}" 
                                   onchange="aggiornaCollo(${idx}, 'barcode', this.value)">
                        </div>
                    </div>
                    
                    <details style="margin-top: 10px;">
                        <summary style="cursor: pointer; color: var(--primary); font-weight: bold;">
                            🔍 Dettagli Aggiuntivi
                        </summary>
                        <div style="margin-top: 10px;">
                            <div class="two-cols">
                                <div class="input-group">
                                    <label>📏 Spessore (mm):</label>
                                    <input type="number" step="0.1" id="collo_spessore_${idx}" value="${collo.spessore || 0}" 
                                           onchange="aggiornaCollo(${idx}, 'spessore', parseFloat(this.value))">
                                </div>
                                <div class="input-group">
                                    <label>↔️ Larghezza (mm):</label>
                                    <input type="number" id="collo_larghezza_${idx}" value="${collo.larghezza || 0}" 
                                           onchange="aggiornaCollo(${idx}, 'larghezza', parseInt(this.value))">
                                </div>
                            </div>
                            <div class="input-group">
                                <label>↕️ Lunghezza (m):</label>
                                <input type="number" step="0.1" id="collo_lunghezza_${idx}" value="${collo.lunghezza || 0}" 
                                       onchange="aggiornaCollo(${idx}, 'lunghezza', parseFloat(this.value))">
                            </div>
                            <div class="input-group">
                                <label>🎨 Colore:</label>
                                <input type="text" id="collo_colore_${idx}" value="${collo.colore || ''}" 
                                       onchange="aggiornaCollo(${idx}, 'colore', this.value)">
                            </div>
                        </div>
                    </details>
                </div>
            `).join('');
        }
        
        function aggiornaCollo(idx, campo, valore) {
            if (!stato.colli[idx]) stato.colli[idx] = {};
            stato.colli[idx][campo] = valore;
        }
        
        function rimuoviCollo(idx) {
            if (stato.numColli > 1) {
                stato.numColli--;
                document.getElementById('numColli').value = stato.numColli;
                stato.colli.splice(idx, 1);
                stato.datiOCR.splice(idx, 1);
                renderColli();
            }
        }
        
        // ============================================
        // RIEPILOGO E EXPORT
        // ============================================
        function aggiornaRiepilogo() {
            // Assicura che i dati dei colli siano aggiornati
            for (let i = 0; i < stato.numColli; i++) {
                if (!stato.colli[i]) stato.colli[i] = {};
                
                // Copia dati OCR se disponibili e il campo è vuoto
                const ocr = stato.datiOCR[i] || {};
                if (!stato.colli[i].codice && ocr.codice) stato.colli[i].codice = ocr.codice;
                if (!stato.colli[i].mq && ocr.mq) stato.colli[i].mq = ocr.mq;
                if (!stato.colli[i].peso && ocr.peso) stato.colli[i].peso = ocr.peso;
                if (!stato.colli[i].barcode && ocr.barcode) stato.colli[i].barcode = ocr.barcode;
                if (!stato.colli[i].spessore && ocr.spessore) stato.colli[i].spessore = ocr.spessore;
                if (!stato.colli[i].larghezza && ocr.larghezza) stato.colli[i].larghezza = ocr.larghezza;
                if (!stato.colli[i].colore && ocr.colore) stato.colli[i].colore = ocr.colore;
            }
            
            // Calcola totali
            let totMQ = 0, totPeso = 0;
            for (let collo of stato.colli) {
                totMQ += parseFloat(collo.mq) || 0;
                totPeso += parseInt(collo.peso) || 0;
            }
            
            document.getElementById('totColli').textContent = stato.numColli;
            document.getElementById('totMQ').textContent = totMQ.toFixed(2);
            document.getElementById('totPeso').textContent = totPeso;
            
            // Genera tabella preview
            const dataArrivo = document.getElementById('dataArrivo').value;
            const fornitore = document.getElementById('fornitore').value;
            
            let tableHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Codice</th>
                            <th>MQ</th>
                            <th>KG</th>
                            <th>Barcode</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            stato.colli.forEach((collo, idx) => {
                tableHTML += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${collo.codice || '-'}</td>
                        <td>${collo.mq || 0}</td>
                        <td>${collo.peso || 0}</td>
                        <td>${collo.barcode || '-'}</td>
                    </tr>
                `;
            });
            
            tableHTML += '</tbody></table>';
            document.getElementById('tabellaPreview').innerHTML = tableHTML;
        }
        
        // ============================================
        // ESPORTAZIONE
        // ============================================
        function esportaExcel() {
            aggiornaRiepilogo();
            
            const dataArrivo = document.getElementById('dataArrivo').value;
            const fornitore = document.getElementById('fornitore').value;
            const note = document.getElementById('note').value;
            
            // Prepara dati per Excel
            const dati = stato.colli.map((collo, idx) => ({
                'Foto': stato.foto[idx]?.nome || '',
                'Codice': collo.codice || '',
                'MQ': collo.mq || 0,
                'Peso (KG)': collo.peso || 0,
                'Fornitore': fornitore,
                'Data Arrivo': dataArrivo,
                'Barcode': collo.barcode || '',
                'Spessore': collo.spessore || 0,
                'Larghezza': collo.larghezza || 0,
                'Lunghezza': collo.lunghezza || 0,
                'Colore': collo.colore || '',
                'Note': note
            }));
            
            // Crea workbook
            const ws = XLSX.utils.json_to_sheet(dati);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Arrivi');
            
            // Scarica
            const nomeFile = `arrivi_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.xlsx`;
            XLSX.writeFile(wb, nomeFile);
        }
        
        async function salvaInCloud() {
            aggiornaRiepilogo();
            
            const dataArrivo = document.getElementById('dataArrivo').value;
            const fornitore = document.getElementById('fornitore').value;
            const note = document.getElementById('note').value;
            
            // Prepara record per Supabase
            const record = {
                data_arrivo: dataArrivo,
                fornitore: fornitore,
                note: note,
                num_colli: stato.numColli,
                totale_mq: parseFloat(document.getElementById('totMQ').textContent),
                totale_peso: parseInt(document.getElementById('totPeso').textContent),
                colli_dati: JSON.stringify(stato.colli),
                created_at: new Date().toISOString()
            };
            
            mostraLoading('Salvataggio in cloud...');
            
            try {
                // Qui dovrai aggiungere la chiamata Supabase
                // const { data, error } = await supabase.from('arrivi_merce').insert([record]);
                
                // Per ora simuliamo
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                nascondiLoading();
                alert('✅ Dati salvati nel cloud! (Integrazione Supabase da completare)');
                
            } catch (error) {
                nascondiLoading();
                console.error('Errore salvataggio:', error);
                alert('❌ Errore durante il salvataggio.');
            }
        }
        
        function nuovoCarico() {
            if (confirm('Vuoi iniziare un nuovo carico? I dati attuali verranno cancellati.')) {
                stato.foto = [];
                stato.datiOCR = [];
                stato.numColli = 1;
                stato.colli = [];
                
                document.getElementById('numColli').value = 1;
                document.getElementById('fornitore').value = '';
                document.getElementById('note').value = '';
                document.getElementById('dataArrivo').valueAsDate = new Date();
                
                aggiornaFotoGrid();
                renderColli();
                openTab('foto');
            }
        }
        
        // ============================================
        // UTILITY
        // ============================================
        function mostraLoading(testo) {
            document.getElementById('loading-text').textContent = testo;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        
        function nascondiLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    </script>
</body>
